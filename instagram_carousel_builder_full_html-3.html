<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Instagram Carousel Builder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Roboto',sans-serif;}
body{background:#111;color:white;display:flex;height:100vh;overflow:hidden;}
.sidebar{width:360px;background:#1b1b1b;padding:20px;overflow:auto;border-right:1px solid #333;}
.sidebar h2{margin-bottom:15px;}
.group{margin-bottom:24px;}
.group label{display:block;margin-bottom:8px;font-size:14px;opacity:.8;}
.group input,.group select,.group textarea,.group button{width:100%;margin-bottom:10px;padding:10px;border:none;border-radius:10px;background:#2b2b2b;color:white;}
button{cursor:pointer;transition:.2s;}
button:hover{background:#444;}
.workspace{flex:1;display:flex;flex-direction:column;align-items:center;overflow:auto;padding:20px;gap:30px;}
.slide-container{position:relative;}
canvas{border-radius:20px;box-shadow:0 0 30px rgba(0,0,0,.5);transform-origin:top center;}
.slides-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
.slide-thumb{width:70px;height:88px;background:#333;border-radius:10px;cursor:pointer;border:2px solid transparent;display:flex;align-items:center;justify-content:center;}
.slide-thumb.active{border:2px solid white;}
</style>
</head>
<body>
<div class="sidebar">
<h2>Carousel Builder</h2>
<div class="group">
<button onclick="addSlide()">➕ Добавить слайд</button>
<button onclick="exportPNG()">📥 Скачать PNG</button>
</div>
<div class="group">
<label>Загрузить изображение</label>
<input type="file" id="imageLoader"/>
<button onclick="addImageAbove()">🖼 Добавить фото поверх</button>
</div>
<div class="group">
<label>Blur изображения</label>
<input type="range" min="0" max="20" value="0" id="blurRange"/>
<label>Шум изображения</label>
<input type="range" min="0" max="100" value="0" id="noiseRange"/>
<label>Закругление углов фото</label>
<input type="range" min="0" max="100" value="20" id="radiusRange"/>
<button onclick="cropImage()">✂ Обрезать фото</button>
</div>
<div class="group">
<label>Тип затемнения</label>
<select id="overlayType">
<option value="gradient">Градиент</option>
<option value="solid">Сплошная заливка</option>
</select>
<label>Цвет</label>
<input type="color" id="overlayColor" value="#000000"/>
<label>Прозрачность</label>
<input type="range" min="0" max="1" step="0.01" value="0.5" id="overlayOpacity"/>
<button onclick="applyOverlay()">Применить</button>
</div>
<div class="group">
<label>Заголовок</label>
<input type="text" id="titleText"/>
<label>Текст</label>
<textarea id="bodyText"></textarea>
<label>Шрифт</label>
<select id="fontFamily">
<option>Roboto</option>
<option>Arial</option>
<option>Georgia</option>
<option>Verdana</option>
<option>Impact</option>
</select>
<label>Загрузить свой шрифт</label>
<input type="file" id="fontUpload" accept=".ttf,.otf,.woff,.woff2"/>
<button onclick="uploadFont()">Добавить шрифт</button>
<label>Цвет текста</label>
<input type="color" id="textColor" value="#ffffff"/>
<button onclick="addTexts()">Добавить текст</button>
</div>
<div class="group">
<label>Magic Ivan PNG</label>
<select id="logoPosition">
<option value="top">Сверху</option>
<option value="center">По центру</option>
<option value="bottom">Снизу</option>
</select>
<label>Размер логотипа</label>
<input type="range" min="50" max="400" value="180" id="logoSize"/>
<button onclick="addLogo()">Добавить плашку</button>
</div>
<div class="group">
<button onclick="addSwipeHint()">Добавить «СВАЙП →»</button>
<button onclick="undoAction()">↩ Назад</button>
<button onclick="redoAction()">↪ Вперед</button>
<button onclick="deleteSelected()">🗑 Удалить выделенный объект</button>
<button onclick="centerSelected()">📍 Центровать объект</button>
</div>

<div class="group">
<label>Масштаб предпросмотра</label>
<input type="range" min="20" max="100" value="55" id="previewZoom"/>
</div>

<div class="group">
<label>Цвет фона</label>
<input type="color" id="backgroundColor" value="#000000"/>
<button onclick="setBackgroundColor()">Применить фон</button>
</div>

<div class="group">
<label>Загрузить отдельную плашку PNG</label>
<input type="file" id="logoUpload"/>
<button onclick="uploadCustomLogo()">Добавить PNG</button>
</div>

<div class="group">
<label>Слои</label>
<select id="layersList" size="8" style="height:180px"></select>
<button onclick="moveLayerUp()">⬆ Слой выше</button>
<button onclick="moveLayerDown()">⬇ Слой ниже</button>
</div>
</div>
<div class="workspace">
<div class="slides-bar" id="slidesBar"></div>
<div class="slide-container">
<canvas id="canvas" width="1080" height="1350"></canvas>
</div>
</div>
<script>
const canvas=new fabric.Canvas('canvas',{preserveObjectStacking:true,backgroundColor:'#000'});
let history=[];
let redo=[];
let slides=[];
let currentSlide=0;
function saveSlide(){slides[currentSlide]=JSON.stringify(canvas.toJSON());saveHistory();}

function saveHistory(){history.push(JSON.stringify(canvas.toJSON()));if(history.length>50){history.shift();}}

function undoAction(){if(history.length>1){redo.push(history.pop());const prev=history[history.length-1];canvas.loadFromJSON(prev,()=>{canvas.renderAll();updateLayers();});}}

function redoAction(){if(redo.length>0){const state=redo.pop();history.push(state);canvas.loadFromJSON(state,()=>{canvas.renderAll();updateLayers();});}}
function loadSlide(index){if(slides[currentSlide]){saveSlide();}currentSlide=index;canvas.loadFromJSON(slides[index],()=>{canvas.renderAll();});updateSlidesUI();}
function updateSlidesUI(){const bar=document.getElementById('slidesBar');bar.innerHTML='';slides.forEach((s,i)=>{const div=document.createElement('div');div.className='slide-thumb';if(i===currentSlide){div.classList.add('active');}div.innerHTML=i+1;div.onclick=()=>loadSlide(i);bar.appendChild(div);});}
function addSlide(){saveSlide();canvas.clear();slides.push(JSON.stringify(canvas.toJSON()));currentSlide=slides.length-1;updateSlidesUI();}
slides.push(JSON.stringify(canvas.toJSON()));updateSlidesUI();

function updateLayers(){const list=document.getElementById('layersList');list.innerHTML='';canvas.getObjects().forEach((obj,index)=>{const option=document.createElement('option');option.value=index;option.text=(obj.name||obj.type)+' ('+index+')';list.appendChild(option);});}

function deleteSelected(){const active=canvas.getActiveObject();if(active){canvas.remove(active);updateLayers();canvas.renderAll();}}

function centerSelected(){const active=canvas.getActiveObject();if(active){active.set({left:540,originX:'center'});canvas.renderAll();}}

function moveLayerUp(){const selected=document.getElementById('layersList').selectedIndex;if(selected>=0){const obj=canvas.getObjects()[selected];canvas.bringForward(obj);updateLayers();canvas.renderAll();}}

function moveLayerDown(){const selected=document.getElementById('layersList').selectedIndex;if(selected>=0){const obj=canvas.getObjects()[selected];canvas.sendBackwards(obj);updateLayers();canvas.renderAll();}}

function setBackgroundColor(){const color=document.getElementById('backgroundColor').value;canvas.setBackgroundColor(color,canvas.renderAll.bind(canvas));}

function uploadCustomLogo(){const input=document.getElementById('logoUpload');if(!input.files[0]) return;const reader=new FileReader();reader.onload=function(event){fabric.Image.fromURL(event.target.result,function(img){img.set({left:540,top:150,originX:'center',originY:'center',name:'PNG Плашка'});img.scaleToWidth(240);canvas.add(img);updateLayers();canvas.renderAll();});};reader.readAsDataURL(input.files[0]);}

document.getElementById('previewZoom').addEventListener('input',function(){const scale=this.value/100;document.querySelector('canvas').style.transform='scale('+scale+')';});
document.getElementById('imageLoader').addEventListener('change',function(e){const reader=new FileReader();reader.onload=function(event){fabric.Image.fromURL(event.target.result,function(img){img.set({left:540,top:675,originX:'center',originY:'center',scaleX:1,scaleY:1});img.scaleToWidth(1080);canvas.add(img);canvas.sendToBack(img);canvas.renderAll();updateLayers();saveHistory();});};reader.readAsDataURL(e.target.files[0]);});
function applyOverlay(){const type=document.getElementById('overlayType').value;const color=document.getElementById('overlayColor').value;const opacity=document.getElementById('overlayOpacity').value;let overlay;if(type==='solid'){overlay=new fabric.Rect({width:1080,height:1350,fill:color,opacity:opacity,selectable:true,name:'Заливка'});}else{overlay=new fabric.Rect({width:1080,height:1350,fill:new fabric.Gradient({type:'linear',coords:{x1:0,y1:1350,x2:0,y2:0},colorStops:[{offset:0,color:color},{offset:0.35,color:color},{offset:0.7,color:'transparent'},{offset:1,color:'transparent'}]}),opacity:opacity,name:'Градиент'});}canvas.add(overlay);updateLayers();canvas.renderAll();}
function addTexts(){const title=document.getElementById('titleText').value;const body=document.getElementById('bodyText').value;const font=document.getElementById('fontFamily').value;const color=document.getElementById('textColor').value;if(title){const t=new fabric.Textbox(title,{width:900,left:540,top:200,originX:'center',fill:color,fontFamily:'Roboto',fontWeight:'bold',fontSize:72,textAlign:'center'});t.name='Заголовок';canvas.add(t);}if(body){const b=new fabric.Textbox(body,{width:850,left:540,top:350,originX:'center',fill:color,fontFamily:'Roboto',fontSize:36,textAlign:'center'});b.name='Текст';canvas.add(b);}canvas.renderAll();}
function addLogo(){const size=document.getElementById('logoSize').value;const pos=document.getElementById('logoPosition').value;let top=100;if(pos==='center')top=675;if(pos==='bottom')top=1180;fabric.Image.fromURL('assets/magic-ivan.png',function(img){img.set({left:540,top:top,originX:'center',originY:'center'});img.scaleToWidth(size);canvas.add(img);updateLayers();canvas.renderAll();});}
function addSwipeHint(){const txt=new fabric.Text('СВАЙП →',{left:540,top:1260,originX:'center',fill:'white',fontFamily:'Roboto',fontSize:32,fontWeight:'bold',charSpacing:60,name:'Свайп'});canvas.add(txt);updateLayers();canvas.renderAll();}
function addImageAbove(){const input=document.getElementById('imageLoader');if(!input.files[0]) return;const reader=new FileReader();reader.onload=function(event){fabric.Image.fromURL(event.target.result,function(img){img.set({left:540,top:675,originX:'center',originY:'center',rx:20,ry:20});img.scaleToWidth(700);canvas.add(img);updateLayers();canvas.renderAll();});};reader.readAsDataURL(input.files[0]);}
document.getElementById('blurRange').addEventListener('input',function(){const value=parseInt(this.value);const active=canvas.getActiveObject();if(active&&active.type==='image'){active.filters=[new fabric.Image.filters.Blur({blur:value/100})];active.applyFilters();canvas.renderAll();}});

document.getElementById('noiseRange').addEventListener('input',function(){const value=parseInt(this.value);const active=canvas.getActiveObject();if(active&&active.type==='image'){active.filters=[new fabric.Image.filters.Noise({noise:value})];active.applyFilters();canvas.renderAll();}});

document.getElementById('radiusRange').addEventListener('input',function(){const value=parseInt(this.value);const active=canvas.getActiveObject();if(active&&active.type==='image'){active.clipPath=new fabric.Rect({rx:value,ry:value,width:active.width,height:active.height,originX:'center',originY:'center'});canvas.renderAll();}});
function cropImage(){const active=canvas.getActiveObject();if(active&&active.type==='image'){active.scaleX*=0.8;active.scaleY*=0.8;canvas.renderAll();}}

function uploadFont(){const input=document.getElementById('fontUpload');if(!input.files[0]) return;const file=input.files[0];const reader=new FileReader();reader.onload=function(e){const fontName=file.name.split('.')[0];const style=document.createElement('style');style.innerHTML=`@font-face{font-family:'${fontName}';src:url(${e.target.result});}`;document.head.appendChild(style);const option=document.createElement('option');option.text=fontName;option.value=fontName;document.getElementById('fontFamily').appendChild(option);};reader.readAsDataURL(file);}

canvas.on('text:selection:changed',function(e){const obj=e.target;if(obj&&obj.isEditing){console.log('selection changed');}});

document.getElementById('textColor').addEventListener('input',function(){const active=canvas.getActiveObject();if(active&&active.isEditing){const start=active.selectionStart;const end=active.selectionEnd;for(let i=start;i<end;i++){active.setSelectionStyles({fill:this.value},i,i+1);}canvas.renderAll();}});

function exportPNG(){saveSlide();slides.forEach((slide,index)=>{const tempCanvas=new fabric.Canvas(null,{width:1080,height:1350});tempCanvas.loadFromJSON(slide,()=>{const dataURL=tempCanvas.toDataURL({format:'png',quality:1});const a=document.createElement('a');a.href=dataURL;a.download=`slide-${index+1}.png`;a.click();});});}
</script>
</body>
</html>
